<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Historique | MobiPay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body data-page="client-historique" class="">

<main class="client-page">

        <div>
          <div class="client-brand"><i class="bi bi-phone me-1"></i>MobiPay</div>
          <div class="client-phone" data-current-phone>034 12 345 67</div>
        </div>
        <a class="client-logout" href="../index.html"><i class="bi bi-box-arrow-right me-1"></i>Déconnexion</a>
      </div>
    </header>
    <div class="client-content">
      <div class="client-content-container">
      
<div class="page-heading mb-3">

</div>
<div class="d-flex flex-wrap gap-2 mb-3">

<div id="history-list" class="d-grid gap-2"></div>

      </div>
    </div>
