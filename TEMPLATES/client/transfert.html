<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Prototype HTML Bootstrap d'un opérateur Mobile Money">
  <title>Transfert | MobiPay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-page="client-transfert" class="">

<main class="client-page">
  <section class="client-shell">
    <header class="client-header">
      <div class="d-flex align-items-center justify-content-between gap-3">
        <div>
          <div class="client-brand"><i class="bi bi-phone me-1"></i>MobiPay</div>
          <div class="client-phone" data-current-phone>034 12 345 67</div>
        </div>
        <a class="client-logout" href="../index.html"><i class="bi bi-box-arrow-right me-1"></i>Déconnexion</a>
      </div>
    </header>
    <div class="client-content">
      <div class="client-content-container">
      
<div id="form-view">
  <div class="page-heading">
    <h1><i class="bi bi-arrow-left-right me-1"></i>Faire un transfert</h1>
    <p>Transférez de l'argent vers un autre numéro MobiPay.</p>
  </div>
  <div class="mp-card mp-card-body mb-3">
    <div class="stat-label">Solde disponible</div>
    <div class="stat-value" data-current-balance>115 000 Ar</div>
  </div>
  <form id="operation-form">
    <div class="mb-3">
      <label class="form-label" for="recipient">Numéro destinataire</label>
      <div class="input-group">
        <span class="input-group-text">+261</span>
        <input class="form-control" id="recipient" type="tel" inputmode="numeric" maxlength="14" placeholder="033 12 345 67" required>
      </div>
      <div id="recipient-error" class="small text-danger mt-2 d-none"></div>
    </div>
    <div class="mb-3">
      <label class="form-label" for="amount">Montant à envoyer (Ar)</label>
      <input class="form-control" id="amount" type="number" min="100" max="2000000" step="100" placeholder="Ex. 10 000" required>
    </div>
    <div id="operation-summary" class="summary-box d-none mb-3"></div>
    <button class="btn btn-primary w-100 fw-bold py-2" type="submit"><i class="bi bi-send me-1"></i>Envoyer le transfert</button>
  </form>
</div>

<div id="success-view" class="success-panel d-none">
  <div class="success-icon"><i class="bi bi-check2"></i></div>
  <h2 id="success-title" class="h5 fw-bold text-success mb-1">Opération effectuée !</h2>
  <p id="success-recipient" class="text-mp-muted small mb-2 d-none"></p>
  <div id="success-amount" class="display-6 fw-bold text-mp-primary mb-3">0 Ar</div>
  <div id="success-details" class="small text-mp-muted bg-light border rounded-3 px-3 py-2 mb-4"></div>
  <button id="new-operation" class="btn btn-mp w-100" type="button">Nouvelle opération</button>
</div>

      </div>
    </div>
    
<nav class="client-nav" aria-label="Navigation client">
  <a href="dashboard.html" class=""><i class="bi bi-house-door"></i><span>Accueil</span></a>
  <a href="depot.html" class=""><i class="bi bi-arrow-down-circle"></i><span>Dépôt</span></a>
  <a href="retrait.html" class=""><i class="bi bi-arrow-up-circle"></i><span>Retrait</span></a>
  <a href="transfert.html" class="active"><i class="bi bi-arrow-left-right"></i><span>Transfert</span></a>
  <a href="historique.html" class=""><i class="bi bi-clock-history"></i><span>Historique</span></a>
</nav>
  </section>
</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
