<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Prototype HTML Bootstrap d'un opérateur Mobile Money">
  <title>Connexion | MobiPay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="login" class="">

<main class="login-page">
  <section class="login-card" aria-labelledby="login-title">
    <div class="text-center mb-4">
      <div class="brand-mark"><i class="bi bi-phone"></i></div>
      <div class="brand-name" id="login-title">MobiPay</div>
      <div class="brand-subtitle">Opérateur Mobile Money</div>
    </div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label" for="phone">Numéro de téléphone</label>
        <div class="input-group">
          <span class="input-group-text">+261</span>
          <input class="form-control" id="phone" type="tel" inputmode="numeric" placeholder="034 12 345 67" maxlength="14" autocomplete="tel" required autofocus>
        </div>
        <div id="prefix-hint" class="form-text">Préfixes actifs : 033, 034, 037</div>
        <div id="phone-error" class="small text-danger mt-2 d-none" role="alert"></div>
      </div>

      <button class="btn btn-mp w-100" type="submit">
        <i class="bi bi-box-arrow-in-right me-2"></i>Accéder à mon compte
      </button>
    </form>

    <div class="text-center border-top mt-4 pt-3">
      <a class="small text-decoration-none text-mp-muted" href="admin/dashboard.html">
        <i class="bi bi-shield-lock me-1"></i>Espace opérateur
      </a>
    </div>
  </section>
</main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
